[capture]
format = "jpeg"
save_dir = "~/Pictures/XDR-Snips"
filename_pattern = "screenshot_{timestamp}"

# Auto-resize (downscale) captures bigger than these limits.
# Scaling preserves aspect ratio so both dimensions fit within the caps.
[capture.resize]
enabled = false
max_width = 2048
max_height = 2048
keep_original = false
keep_original = false

[capture.format_options.jpeg]
quality = 85
chroma_subsampling = "4:2:2"

[capture.format_options.png]
compression = 6
filter = "adaptive"

[capture.format_options.webp]
lossless = false
quality = 80.0

[capture.format_options.tiff]
compression = "lzw"

[capture.format_options.exr]
compression = "zip16"

[hotkey]
key = "PrintScreen"
modifiers = []

[behavior]
copy_to_clipboard = true
save_to_file = true
show_notification = true
